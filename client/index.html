<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>ALTER AI</title>    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Safety check for analytics variables
      const analyticsEndpoint = "%VITE_ANALYTICS_ENDPOINT%";
      const websiteId = "%VITE_ANALYTICS_WEBSITE_ID%";
      if (analyticsEndpoint && !analyticsEndpoint.startsWith('%') && websiteId && !websiteId.startsWith('%')) {
        const script = document.createElement('script');
        script.src = `${analyticsEndpoint}/umami`;
        script.setAttribute('data-website-id', websiteId);
        script.defer = true;
        document.body.appendChild(script);
      }
    </script>
  </body>

</html>
